<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iyakyou outfit</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #f5f0e8; --dark: #1a1208; --brown: #6b4c2a;
      --gold: #c9933a; --soft: #e8dfd0; --accent: #d4573c;
    }
    body { background-color: var(--cream); color: var(--dark); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.5; }
    header { width: 100%; padding: 48px 24px 32px; text-align: center; }
    .brand-tag { font-size: 10px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--brown); display: block; margin-bottom: 12px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: clamp(38px, 10vw, 72px); font-weight: 900; line-height: 0.95; color: var(--dark); letter-spacing: -1px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.25s; }
    .brand-name span { color: var(--gold); font-style: italic; }
    .brand-sub2 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 6vw, 44px); font-weight: 700; color: var(--dark); display: block; margin-top: 2px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.3s; }
    .divider { width: 60px; height: 1.5px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 20px auto; opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s; }
    .intro { font-size: 13px; font-weight: 300; color: var(--brown); text-align: center; max-width: 300px; line-height: 1.7; padding: 0 24px; margin: 0 auto; opacity: 0; animation: fadeUp 0.7s ease forwards 0.6s; }
    .products { width: 100%; max-width: 480px; padding: 36px 20px 60px; display: flex; flex-direction: column; gap: 14px; }
    .section-label { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--brown); font-weight: 500; padding: 0 4px; margin-bottom: 4px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.7s; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--brown); font-size: 13px; line-height: 1.8; opacity: 0; animation: fadeUp 0.6s ease forwards 0.8s; }
    .empty-state span { font-size: 32px; display: block; margin-bottom: 12px; }
    .product-card { display: flex; align-items: center; justify-content: space-between; background: white; border: 1px solid rgba(107,76,42,0.12); border-radius: 16px; padding: 18px 22px; text-decoration: none; color: var(--dark); position: relative; overflow: hidden; transition: all 0.35s cubic-bezier(0.23,1,0.32,1); cursor: pointer; box-shadow: 0 2px 12px rgba(107,76,42,0.05); opacity: 0; }
    .product-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--gold) 0%, var(--accent) 100%); opacity: 0; transition: opacity 0.35s ease; }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(107,76,42,0.15); border-color: var(--gold); }
    .product-card:hover::before { opacity: 0.06; }
    .product-card:active { transform: scale(0.98); }
    .card-left { display: flex; align-items: center; gap: 16px; position: relative; z-index: 1; }
    .product-number { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; min-width: 36px; }
    .product-info { display: flex; flex-direction: column; gap: 3px; }
    .product-name { font-size: 14px; font-weight: 500; color: var(--dark); line-height: 1.2; }
    .product-desc { font-size: 11px; font-weight: 300; color: var(--brown); opacity: 0.8; }
    .card-right { position: relative; z-index: 1; display: flex; align-items: center; gap: 8px; }
    .shopee-badge { background: linear-gradient(135deg,#ee4d2d,#f56227); color: white; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border-radius: 20px; }
    .arrow { width: 28px; height: 28px; border-radius: 50%; background: var(--soft); display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
    .product-card:hover .arrow { background: var(--gold); }
    .arrow svg { width: 12px; height: 12px; stroke: var(--brown); transition: stroke 0.3s ease; }
    .product-card:hover .arrow svg { stroke: white; }
    footer { padding: 24px; text-align: center; opacity: 0; animation: fadeUp 0.6s ease forwards 1.5s; }
    .footer-text { font-size: 10px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; color: var(--brown); opacity: 0.5; }
    .tiktok-note { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; background: var(--dark); color: white; font-size: 10px; font-weight: 400; letter-spacing: 1px; padding: 7px 14px; border-radius: 20px; }
    .tiktok-note svg { width: 12px; height: 12px; fill: white; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes cardFadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal { background: var(--cream); border-radius: 28px 28px 0 0; padding: 32px 28px 48px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.23,1,0.32,1); }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: var(--soft); border-radius: 2px; margin: 0 auto 24px; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .modal-sub { font-size: 12px; color: var(--brown); margin-bottom: 28px; font-weight: 300; }
    .modal-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; background: linear-gradient(135deg,#ee4d2d,#f56227); color: white; border: none; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.3s ease; box-shadow: 0 8px 24px rgba(238,77,45,0.3); }
    .modal-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(238,77,45,0.4); }
    .modal-cancel { display: block; text-align: center; margin-top: 14px; font-size: 12px; color: var(--brown); font-weight: 300; cursor: pointer; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <span class="brand-tag">Welcome to</span>
    <h1 class="brand-name">iyak<span>you</span></h1>
    <span class="brand-sub2">outfit</span>
    <div class="divider"></div>
    <p class="intro">Temukan outfit favoritmu di Shopee. Ketuk nomor produk sesuai yang ada di video TikTok kami ✨</p>
  </header>
  <div class="products">
    <div class="section-label">— Pilih Produk —</div>
    <div id="productList"></div>
  </div>
  <footer>
    <div class="footer-text">iyakyou outfit © 2025</div>
    <div class="tiktok-note">
      <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.27 8.27 0 004.84 1.54V6.77a4.85 4.85 0 01-1.07-.08z"/></svg>
      Dari TikTok? Ketuk produknya!
    </div>
  </footer>
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-sub">Kamu akan diarahkan ke halaman Shopee ✨</div>
      <a id="modalShopeeBtn" href="#" class="modal-btn" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.27 8.27 0 004.84 1.54V6.77a4.85 4.85 0 01-1.07-.08z"/></svg>
        Buka di Shopee
      </a>
      <span class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('active')">Batalkan</span>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'iyakyou_products';
    function getProducts() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function renderProducts() {
      const products = getProducts();
      const list = document.getElementById('productList');
      list.innerHTML = '';
      if (products.length === 0) {
        list.innerHTML = '<div class="empty-state"><span>🛍️</span>Produk akan segera hadir.<br>Pantau terus TikTok kami!</div>';
        return;
      }
      products.forEach((p, i) => {
        const num = String(p.number || (i+1)).padStart(2,'0');
        const card = document.createElement('a');
        card.className = 'product-card';
        card.href = '#';
        card.style.cssText = 'animation-name:cardFadeUp;animation-duration:0.5s;animation-fill-mode:forwards;animation-delay:'+(0.8+i*0.1)+'s';
        card.innerHTML = '<div class="card-left"><div class="product-number">'+num+'</div><div class="product-info"><div class="product-name">'+p.name+'</div><div class="product-desc">Tap untuk lihat di Shopee</div></div></div><div class="card-right"><div class="shopee-badge">Shopee</div><div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div></div>';
        card.addEventListener('click', (e) => { e.preventDefault(); openModal(p.name, p.url); });
        list.appendChild(card);
      });
    }
    function openModal(name, url) {
      document.getElementById('modalTitle').textContent = name;
      document.getElementById('modalShopeeBtn').href = url;
      document.getElementById('modalOverlay').classList.add('active');
    }
    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('active');
    }
    renderProducts();
  </script>
</body>
</html>
